name: Upstox Daily Auto-Auth

on:
  schedule:
    # 22:30 UTC is exactly 04:00 AM IST
    - cron: '30 22 * * *'
  workflow_dispatch: # Allows us to click a button to test it manually

jobs:
  generate-token:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.14'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Auto-Auth Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
        UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
        UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
        UPSTOX_TOTP_SECRET: ${{ secrets.UPSTOX_TOTP_SECRET }}
        UPSTOX_MOBILE_NO: ${{ secrets.UPSTOX_MOBILE_NO }}
        UPSTOX_PIN: ${{ secrets.UPSTOX_PIN }}
      run: |
        python python_engine/src/auto_auth.py

    - name: Sync Historical Market Data
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
        UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
        UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
        UPSTOX_TOTP_SECRET: ${{ secrets.UPSTOX_TOTP_SECRET }}
        UPSTOX_MOBILE_NO: ${{ secrets.UPSTOX_MOBILE_NO }}
        UPSTOX_PIN: ${{ secrets.UPSTOX_PIN }}
      run: |
        python python_engine/src/sync_history.py

    - name: Upload Error Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-screenshot
        path: error_screenshot.png

